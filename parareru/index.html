<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE風 AIチャットBot（Google公式画像生成対応版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        /* トップページ（初期表示） */
        #top-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            background-color: #7493c1;
        }
        .top-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 350px;
        }
        .top-card h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }
        .top-card p {
            font-size: 14px;
            color: #666;
        }
        .top-card input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .top-card input:focus {
            border-color: #7493c1;
        }
        .top-card button {
            background-color: #53b644;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .top-card button:hover {
            background-color: #459d37;
        }

        /* メインアプリ全体（初期は非表示） */
        #main-app {
            display: none; 
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* 設定エリア（折りたたみ対応） */
        #config-area {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .config-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f9fa;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            user-select: none;
        }
        .config-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
            max-height: 250px; 
            opacity: 1;
            border-top: 1px solid #eee;
        }
        .config-content.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            border-top: none;
        }
        .config-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .config-row label {
            font-size: 12px;
            font-weight: bold;
            width: 75px;
            color: #555;
            white-space: nowrap;
        }
        .config-row input {
            flex: 1;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            background-color: #ffffff;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .save-btn {
            background-color: #7493c1;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .save-btn:hover {
            background-color: #5a759e;
        }
        .input-saved {
            background-color: #e4f2fd !important;
            border-color: #7493c1 !important;
        }

        /* チャットエリア（中央） */
        #chat-container {
            flex: 1;
            background-color: #7493c1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 80%;
            gap: 5px;
        }
        .message-text {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .message-image {
            max-width: 250px;
            border-radius: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .loading-text {
            font-size: 12px;
            color: #555;
            background-color: #e0e0e0;
            padding: 5px 10px;
            border-radius: 10px;
        }
        .bot {
            align-self: flex-start;
        }
        .bot .message-text {
            background-color: #ffffff;
            color: #000000;
            border-radius: 15px 15px 15px 0px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .user .message-text {
            background-color: #85e249;
            color: #000000;
            border-radius: 15px 15px 0px 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* 入力エリア（下部） - textareaに合わせて微調整 */
        #input-area {
            background-color: #ffffff;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: flex-end; /* 複数行になった時にボタンを下に合わせる */
            border-top: 1px solid #ddd;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 15px;
            font-size: 14px;
            outline: none;
            resize: none; /* ユーザーによるサイズ変更を禁止 */
            height: 44px; /* 初期の1行分の高さ */
            font-family: inherit;
            line-height: 1.4;
            overflow-y: auto;
        }
        /* スクリプト側で高さを自動調整しますが、大きくなりすぎないように最大高さを指定 */
        #message-input::-webkit-scrollbar {
            display: none;
        }
        #send-button {
            height: 44px; /* 入力欄の初期の高さに合わせる */
            background-color: #53b644;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        #send-button:hover {
            background-color: #459d37;
        }
    </style>
</head>
<body>

    <div id="top-page">
        <div class="top-card">
            <h1>ようこそ！</h1>
            <p>チャットを始める前に<br>あなたの名前を教えてください</p>
            <input type="text" id="top-name-input" placeholder="例：直樹" autocomplete="off">
            <button onclick="startApp()">確定してはじめる</button>
        </div>
    </div>

    <div id="main-app">
        <div id="config-area">
            <div class="config-header" onclick="toggleConfig()">
                <span>⚙️ 設定メニュー</span>
                <span id="config-toggle-icon">▲</span>
            </div>
            
            <div class="config-content" id="config-content">
                <div class="config-row">
                    <label for="user-name">あなたの名前:</label>
                    <input type="text" id="user-name" placeholder="例：直樹">
                    <button class="save-btn" onclick="saveUserName()">確定</button>
                </div>
                <div class="config-row">
                    <label for="api-key">API Key:</label>
                    <input type="password" id="api-key" placeholder="AIのAPIキーを入力してください">
                    <button class="save-btn" onclick="saveApiKey()">確定</button>
                </div>
                <div class="config-row">
                    <label for="system-prompt">キャラ設定:</label>
                    <input type="text" id="system-prompt" placeholder="例：あなたはツンデレな幼馴染です。">
                    <button class="save-btn" onclick="saveSystemPrompt()">確定</button>
                </div>
            </div>
        </div>

        <div id="chat-container">
            <div class="message bot">
                <div class="message-text">こんにちは！上にAPIキーとキャラ設定を入力して「確定」を押してから、メッセージを送ってみてね！</div>
            </div>
        </div>

        <div id="input-area">
            <textarea id="message-input" placeholder="メッセージを入力..."></textarea>
            <button id="send-button" onclick="sendMessage()">送信</button>
        </div>
    </div>

    <script>
        let chatHistory = [];
        
        let confirmedUserName = "";
        let confirmedApiKey = "";
        let confirmedSystemPrompt = "";

        // ページ読み込み時に保存された設定があれば復元する
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('gemini_user_name');
            if (savedName) {
                document.getElementById('top-name-input').value = savedName;
            }

            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
                saveApiKey();
            }
            
            const savedPrompt = localStorage.getItem('gemini_system_prompt');
            if (savedPrompt) {
                document.getElementById('system-prompt').value = savedPrompt;
                saveSystemPrompt();
            }
        });

        // 設定エリアの開閉切り替え関数
        function toggleConfig() {
            const content = document.getElementById('config-content');
            const icon = document.getElementById('config-toggle-icon');
            
            content.classList.toggle('collapsed');
            
            if (content.classList.contains('collapsed')) {
                icon.textContent = '▼';
            } else {
                icon.textContent = '▲';
            }
        }

        // トップページからチャット画面への移行処理
        function startApp() {
            const nameInput = document.getElementById('top-name-input').value.trim();
            if (!nameInput) {
                alert("名前を入力してください。");
                return;
            }

            document.getElementById('top-page').style.display = 'none';
            document.getElementById('main-
